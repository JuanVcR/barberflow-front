<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste de toque</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #fafafa;
        color: #111;
      }

      main {
        width: min(100% - 32px, 420px);
        display: grid;
        gap: 16px;
      }

      button,
      a {
        min-height: 56px;
        border: 1px solid #111;
        border-radius: 12px;
        background: #facc15;
        color: #111;
        font-size: 18px;
        font-weight: 700;
        display: grid;
        place-items: center;
        text-decoration: none;
        touch-action: manipulation;
      }

      pre {
        min-height: 120px;
        padding: 16px;
        border: 1px solid #ddd;
        border-radius: 12px;
        background: #fff;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Teste de toque</h1>
      <button id="button-test">Clique/toque aqui</button>
      <a href="/#/login">Ir para login</a>
      <pre id="log">Esperando toque...</pre>
    </main>

    <script>
      const log = document.querySelector('#log')
      const button = document.querySelector('#button-test')
      let count = 0

      function write(eventName) {
        count += 1
        log.textContent =
          'Evento recebido: ' +
          eventName +
          '\\nTotal: ' +
          count +
          '\\nHora: ' +
          new Date().toLocaleTimeString()
      }

      button.addEventListener('click', () => write('click no botao'))
      button.addEventListener('touchstart', () => write('touchstart no botao'))
      button.addEventListener('touchend', () => write('touchend no botao'))
      document.addEventListener('click', () => write('click no documento'), true)
      document.addEventListener('touchstart', () => write('touchstart no documento'), true)
      document.addEventListener('touchend', () => write('touchend no documento'), true)
    </script>
  </body>
</html>
